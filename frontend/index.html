<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ALPHA PULSE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #080808;
    --surface: #0f0f0f;
    --border: #1c1c1c;
    --border-light: #242424;
    --text: #f0f0f0;
    --text-muted: #555;
    --text-dim: #333;
    --accent: #ffffff;
    --green: #c8f5c8;
    --red: #f5c8c8;
    --yellow: #f5f0c8;
    --green-dim: #1a2e1a;
    --red-dim: #2e1a1a;
    --yellow-dim: #2e2a1a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-img {
    width: 36px;
    height: 36px;
    object-fit: contain;
    filter: grayscale(1) brightness(1.8);
  }

  .logo-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: var(--text);
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .last-update {
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .btn {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border-light);
    padding: 7px 18px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    transition: all 0.15s;
  }
  .btn:hover { color: var(--text); border-color: #555; }

  /* MAIN */
  main { max-width: 1280px; margin: 0 auto; padding: 48px; }

  /* SECTION LABEL */
  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  /* CARDS */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 60px;
  }

  .card {
    background: var(--surface);
    padding: 28px 24px;
    transition: background 0.15s;
    cursor: pointer;
  }
  .card:hover { background: #141414; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
  }

  .ticker {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.05em;
  }
  .asset-name {
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-top: 3px;
    letter-spacing: 0.03em;
  }

  .signal-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-top: 6px;
    flex-shrink: 0;
  }
  .dot-buy    { background: #fff; }
  .dot-sell   { background: #555; }
  .dot-neu    { background: #333; border: 1px solid #555; }

  .score-num {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2.8rem;
    font-weight: 300;
    line-height: 1;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .score-pos { color: var(--text); }
  .score-neg { color: #666; }
  .score-neu { color: #888; }

  .signal-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  .mini-factors {
    display: flex;
    gap: 16px;
  }
  .mini-factor {
    flex: 1;
  }
  .mini-label {
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .mini-val {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.8rem;
    font-weight: 400;
    color: var(--text-muted);
  }

  /* TABLE */
  .table-wrap {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead tr {
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 14px 20px;
    text-align: right;
    font-size: 0.62rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: var(--surface);
  }
  th:first-child { text-align: left; }

  td {
    padding: 16px 20px;
    text-align: right;
    font-size: 0.82rem;
    font-weight: 300;
    border-top: 1px solid var(--border);
    color: var(--text-muted);
  }
  td:first-child { text-align: left; color: var(--text); }

  tbody tr { cursor: pointer; }
  tbody tr:hover td { background: #0c0c0c; }

  .td-ticker {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.05em;
  }
  .td-name { font-size: 0.65rem; color: var(--text-muted); margin-top: 2px; }

  .td-score {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    font-weight: 500;
  }
  .td-score.pos { color: var(--text); }
  .td-score.neg { color: #555; }

  .tag {
    display: inline-block;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 3px;
    font-weight: 400;
  }
  .tag-buy  { background: #fff; color: #000; }
  .tag-sell { background: #1c1c1c; color: #777; border: 1px solid #2a2a2a; }
  .tag-neu  { background: transparent; color: #555; border: 1px solid #2a2a2a; }

  .expl { font-size: 0.7rem; color: #3a3a3a; text-align: left; }

  /* LOADING */
  .loading { text-align: center; color: var(--text-muted); padding: 60px; font-size: 0.8rem; letter-spacing: 0.1em; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

  /* ── DETAIL VIEW ───────────────────────────────────────────────── */

  .detail-back {
    margin-bottom: 36px;
  }

  .detail-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 44px 52px;
    max-width: 780px;
  }

  .detail-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .detail-ticker {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.9rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .detail-name {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 5px;
    letter-spacing: 0.03em;
  }

  .detail-score {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 5.5rem;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -0.03em;
    margin-bottom: 6px;
  }

  .detail-score-label {
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 44px;
  }

  /* GAUGE BARS */
  .factors-section {
    margin-bottom: 32px;
  }

  .gauge-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 13px;
  }

  .gauge-label {
    width: 190px;
    flex-shrink: 0;
    font-size: 0.72rem;
    color: var(--text-muted);
    text-align: right;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .gauge-weight {
    color: var(--text-dim);
  }

  .gauge-val {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 400;
    color: var(--text-muted);
  }

  .gauge-track {
    flex: 1;
    height: 5px;
    background: #161616;
    border-radius: 3px;
    position: relative;
    border: 1px solid var(--border);
  }

  .gauge-center {
    position: absolute;
    left: 50%;
    top: -3px;
    bottom: -3px;
    width: 1px;
    background: #2a2a2a;
    transform: translateX(-50%);
  }

  .gauge-fill {
    position: absolute;
    top: 0;
    bottom: 0;
    border-radius: 2px;
  }

  .detail-expl {
    font-size: 0.7rem;
    color: #3a3a3a;
    line-height: 1.7;
    border-top: 1px solid var(--border);
    padding-top: 22px;
    letter-spacing: 0.02em;
  }

  /* ── History Chart ──────────────────────────────────────────────── */

  .history-chart-section {
    margin-top: 36px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
  }

  .history-chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .history-chart-title {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .period-buttons { display: flex; gap: 2px; }

  .period-btn {
    background: transparent;
    border: 1px solid var(--border-light);
    color: var(--text-muted);
    padding: 4px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.12s;
    line-height: 1.5;
  }
  .period-btn:hover { border-color: #555; color: var(--text); }
  .period-btn.period-btn-active {
    background: var(--text);
    border-color: var(--text);
    color: var(--bg);
    font-weight: 500;
  }

  .chart-container {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    min-height: 40px;
  }

  /* ── Responsive ─────────────────────────────────────────────────── */
  @media (max-width: 700px) {
    main { padding: 24px 20px; }

    .detail-card { padding: 28px 24px; }

    .detail-score { font-size: 4rem; }

    .gauge-wrap {
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 16px;
    }

    .gauge-label {
      width: auto;
      text-align: left;
    }

    .gauge-track {
      width: 100%;
      flex: none;
      align-self: stretch;
    }
  }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <img src="logo.jpg" alt="Logo" class="logo-img">
    <span class="logo-text">AI Alpha Pulse</span>
  </div>
  <div class="header-right">
    <span class="last-update" id="lastUpdate">—</span>
    <button class="btn" onclick="loadScores()">Refresh</button>
  </div>
</header>

<!-- ── Dashboard View ─────────────────────────────────────────────── -->
<main id="dashboardView">
  <div class="section-label">Assets Overview</div>
  <div class="cards-grid" id="cardsGrid">
    <div class="loading">Loading scores...</div>
  </div>

  <div class="section-label">Scoring Table</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Asset</th>
          <th>Trend</th>
          <th>Volatility</th>
          <th>AI Score</th>
          <th>7 дней</th>
          <th>Signal</th>
          <th style="text-align:left">Explanation</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7" class="loading">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- ── Detail View ────────────────────────────────────────────────── -->
<div id="detailView" style="display:none">
  <main>
    <div class="detail-back">
      <button class="btn" onclick="goBack()">← Назад</button>
    </div>
    <div id="detailContent">
      <div class="loading">Loading...</div>
    </div>
  </main>
</div>

<script>
const API = '/api';

/* ── Shared helpers ──────────────────────────────────────────────── */
function scoreClass(s) {
  if (s >= 25) return 'score-pos';
  if (s <= -25) return 'score-neg';
  return 'score-neu';
}
function dotClass(sig) {
  if (['STRONG BUY','BUY'].includes(sig)) return 'dot-buy';
  if (['STRONG SELL','SELL'].includes(sig)) return 'dot-sell';
  return 'dot-neu';
}
function tagClass(sig) {
  if (['STRONG BUY','BUY'].includes(sig)) return 'tag-buy';
  if (['STRONG SELL','SELL'].includes(sig)) return 'tag-sell';
  return 'tag-neu';
}
function tdScoreClass(s) { return s >= 25 ? 'pos' : s <= -25 ? 'neg' : ''; }
function fmt(n) { return (n > 0 ? '+' : '') + (+n).toFixed(1); }

/* ── Dashboard data ──────────────────────────────────────────────── */
async function loadScores() {
  try {
    let items = [];
    try {
      const r = await fetch(`${API}/scores`);
      const data = await r.json();
      items = data.scores || [];
    } catch {}

    if (!items.length) {
      const tickers = [
        ['AAPL','stock'],['MSFT','stock'],['GOOGL','stock'],
        ['SBER','stock'],['GAZP','stock'],
        ['BTCUSDT','crypto'],['ETHUSDT','crypto'],['SOLUSDT','crypto']
      ];
      const res = await Promise.all(tickers.map(([t,type]) =>
        fetch(`${API}/score/${t}?asset_type=${type}`).then(r=>r.json()).catch(()=>null)
      ));
      items = res.filter(Boolean).map(r => ({
        ticker: r.asset?.ticker || r.ticker,
        name:   r.asset?.name   || r.name || r.asset?.ticker,
        trend_score:      r.trend_score,
        volatility_score: r.volatility_score,
        ai_score:         r.ai_score,
        signal:           r.signal,
        explanation:      r.explanation,
      }));
    }

    renderCards(items);
    renderTable(items);
    loadSparklines(items);
    document.getElementById('lastUpdate').textContent =
      new Date().toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    document.getElementById('cardsGrid').innerHTML =
      `<div class="loading">API unavailable — make sure uvicorn is running</div>`;
  }
}

function renderCards(items) {
  const sorted = [...items].sort((a,b) => b.ai_score - a.ai_score);
  document.getElementById('cardsGrid').innerHTML = sorted.map(item => {
    const ai  = +item.ai_score;
    const t   = +item.trend_score;
    const v   = +item.volatility_score;
    const sig = item.signal || 'NEUTRAL';
    return `<div class="card" onclick="navigateToAsset('${item.ticker}')">
      <div class="card-top">
        <div>
          <div class="ticker">${item.ticker}</div>
          <div class="asset-name">${item.name || item.ticker}</div>
        </div>
        <div class="signal-dot ${dotClass(sig)}"></div>
      </div>
      <div class="score-num ${scoreClass(ai)}">${fmt(ai)}</div>
      <div class="signal-label">${sig}</div>
      <div class="mini-factors">
        <div class="mini-factor">
          <div class="mini-label">Trend</div>
          <div class="mini-val">${fmt(t)}</div>
        </div>
        <div class="mini-factor">
          <div class="mini-label">Volat.</div>
          <div class="mini-val">${fmt(v)}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderTable(items) {
  const sorted = [...items].sort((a,b) => b.ai_score - a.ai_score);
  document.getElementById('tableBody').innerHTML = sorted.map(item => {
    const ai  = +item.ai_score;
    const t   = +item.trend_score;
    const v   = +item.volatility_score;
    const sig = item.signal || 'NEUTRAL';
    return `<tr onclick="navigateToAsset('${item.ticker}')">
      <td>
        <div class="td-ticker">${item.ticker}</div>
        <div class="td-name">${item.name || ''}</div>
      </td>
      <td>${fmt(t)}</td>
      <td>${fmt(v)}</td>
      <td><span class="td-score ${tdScoreClass(ai)}">${fmt(ai)}</span></td>
      <td data-sparkline="${item.ticker}" style="text-align:center;vertical-align:middle">—</td>
      <td><span class="tag ${tagClass(sig)}">${sig}</span></td>
      <td class="expl">${item.explanation || '—'}</td>
    </tr>`;
  }).join('');
}

/* ── Sparklines ──────────────────────────────────────────────────── */
function buildSparkline(scores) {
  if (!scores || scores.length < 2) return '—';
  const W = 60, H = 24;
  const n = scores.length;
  const pts = scores.map((s, i) => {
    const x = (i / (n - 1)) * W;
    const y = (100 - s) / 200 * H;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const color = scores[scores.length - 1] > scores[0] ? '#22C55E' : '#EF4444';
  return `<svg width="${W}" height="${H}" style="display:block;margin:auto"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

async function loadSparklines(items) {
  const results = await Promise.all(
    items.map(item =>
      fetch(`${API}/history/${item.ticker}?limit=7`)
        .then(r => r.json())
        .catch(() => [])
    )
  );
  results.forEach((history, i) => {
    const ticker = items[i].ticker;
    const cell = document.querySelector(`td[data-sparkline="${ticker}"]`);
    if (!cell) return;
    if (!history || history.length < 2) { cell.textContent = '—'; return; }
    const scores = history.map(h => +h.ai_score);
    cell.innerHTML = buildSparkline(scores);
  });
}

/* ── Hash routing ────────────────────────────────────────────────── */
function navigateToAsset(ticker) {
  window.location.hash = '#/asset/' + ticker;
}

function goBack() {
  window.location.hash = '';
}

function router() {
  const m = window.location.hash.match(/^#\/asset\/([A-Z0-9]+)$/i);
  if (m) {
    showDetail(m[1].toUpperCase());
  } else {
    showDashboard();
  }
}

function showDashboard() {
  document.getElementById('dashboardView').style.display = '';
  document.getElementById('detailView').style.display = 'none';
}

async function showDetail(ticker) {
  document.getElementById('dashboardView').style.display = 'none';
  document.getElementById('detailView').style.display = '';
  document.getElementById('detailContent').innerHTML =
    `<div class="loading">Loading ${ticker}...</div>`;

  const assetType = ticker.endsWith('USDT') ? 'crypto' : 'stock';
  try {
    const r = await fetch(`${API}/score/${ticker}?asset_type=${assetType}`);
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    renderDetail(data);
  } catch(e) {
    document.getElementById('detailContent').innerHTML =
      `<div class="loading">Failed to load data for ${ticker}</div>`;
  }
}

/* ── Detail view rendering ───────────────────────────────────────── */
const FACTOR_LABELS = {
  trend:             'Trend',
  sentiment:         'Sentiment',
  fundamental:       'Fundamental',
  relative_strength: 'Rel. Strength',
  volatility:        'Volatility',
  insider_funds:     'Insider/Funds',
  macro:             'Macro',
};

const FACTOR_ORDER = [
  'trend', 'sentiment', 'fundamental',
  'relative_strength', 'volatility', 'insider_funds', 'macro',
];

const DEFAULT_WEIGHTS = {
  trend: 0.35, sentiment: 0.20, fundamental: 0.20,
  relative_strength: 0.10, volatility: 0.05, insider_funds: 0.05, macro: 0.05,
};

function gaugeBar(key, value, weights) {
  const w    = weights[key] != null ? weights[key] : (DEFAULT_WEIGHTS[key] || 0);
  const wPct = Math.round(w * 100);
  const label = FACTOR_LABELS[key] || key;
  const val  = +value;
  // halfPct: how far the fill extends from center (0–50% of track width)
  const halfPct = Math.min(Math.abs(val) / 100 * 50, 50);

  let color;
  if (val >= 15)  color = '#4ade80';   // green — positive
  else if (val <= -15) color = '#f87171'; // red — negative
  else             color = '#383838';   // gray — neutral

  // Positive: fill starts at center (50%), extends right
  // Negative: fill ends at center (50%), extends left
  const fillLeft  = val >= 0 ? 50 : (50 - halfPct);
  const fillStyle = `left:${fillLeft.toFixed(2)}%;width:${halfPct.toFixed(2)}%;background:${color};`;

  const sign = val >= 0 ? '+' : '';
  return `<div class="gauge-wrap">
    <div class="gauge-label">${label} <span class="gauge-weight">(${wPct}%)</span>: <span class="gauge-val">${sign}${val.toFixed(1)}</span></div>
    <div class="gauge-track">
      <div class="gauge-center"></div>
      <div class="gauge-fill" style="${fillStyle}"></div>
    </div>
  </div>`;
}

function renderDetail(data) {
  const ticker = data.asset ? data.asset.ticker : (data.ticker || '—');
  const name   = data.asset ? data.asset.name   : (data.name   || ticker);
  const ai  = +data.ai_score;
  const sig = data.signal || 'NEUTRAL';
  const expl = data.explanation || '';
  const fs   = data.factor_scores || {};
  const w    = data.weights || DEFAULT_WEIGHTS;

  const scoreStr = (ai > 0 ? '+' : '') + ai.toFixed(1);

  const barsHtml = FACTOR_ORDER
    .filter(k => k in fs)
    .map(k => gaugeBar(k, fs[k], w))
    .join('');

  const explSection = expl
    ? `<div class="detail-expl">${expl}</div>`
    : '';

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-card">
      <div class="detail-top">
        <div>
          <div class="detail-ticker">${ticker}</div>
          <div class="detail-name">${name}</div>
        </div>
        <span class="tag ${tagClass(sig)}">${sig}</span>
      </div>
      <div class="detail-score ${scoreClass(ai)}">${scoreStr}</div>
      <div class="detail-score-label">AI Score</div>
      <div class="factors-section">${barsHtml}</div>
      ${explSection}
      <div class="history-chart-section">
        <div class="history-chart-header">
          <span class="history-chart-title">AI Score History</span>
          <div class="period-buttons" id="periodBtns_${ticker}">
            <button class="period-btn" data-period="1d">1d</button>
            <button class="period-btn period-btn-active" data-period="7d">7d</button>
            <button class="period-btn" data-period="30d">30d</button>
          </div>
        </div>
        <div id="chartContainer_${ticker}" class="chart-container"></div>
      </div>
    </div>`;

  // Period button handlers
  document.getElementById('periodBtns_' + ticker).addEventListener('click', e => {
    const btn = e.target.closest('.period-btn');
    if (!btn) return;
    document.querySelectorAll('#periodBtns_' + ticker + ' .period-btn')
      .forEach(b => b.classList.remove('period-btn-active'));
    btn.classList.add('period-btn-active');
    loadHistoryChart(ticker, btn.dataset.period);
  });

  // Default chart
  loadHistoryChart(ticker, '7d');
}

/* ── History Chart ───────────────────────────────────────────────── */

const PERIOD_LIMITS = {'1d': 96, '7d': 672, '30d': 2880};

async function loadHistoryChart(ticker, period) {
  const limit = PERIOD_LIMITS[period] || 672;
  const container = document.getElementById('chartContainer_' + ticker);
  if (!container) return;
  container.innerHTML = '<div style="text-align:center;color:#444;padding:40px 20px;font-size:0.72rem;letter-spacing:0.05em">Loading…</div>';
  try {
    const r = await fetch(`${API}/history/${ticker}?limit=${limit}`);
    const data = await r.json();
    if (!Array.isArray(data) || data.length < 2) {
      container.innerHTML = '<div style="text-align:center;color:#444;padding:40px 20px;font-size:0.72rem;letter-spacing:0.05em">No history data yet</div>';
      return;
    }
    renderHistoryChart(data, container, ticker, period);
  } catch(e) {
    container.innerHTML = '<div style="text-align:center;color:#444;padding:40px 20px;font-size:0.72rem">Chart unavailable</div>';
  }
}

function renderHistoryChart(data, container, ticker, period) {
  const W  = Math.max(container.clientWidth || 580, 280);
  const H  = 160;
  const pL = 36, pR = 12, pT = 10, pB = 22;
  const cW = W - pL - pR;
  const cH = H - pT - pB;
  const n  = data.length;

  function xPx(i) { return pL + (i / (n - 1)) * cW; }
  function yPx(v) { return pT + (1 - (v + 100) / 200) * cH; }

  const y0   = yPx(0);
  const pts  = data.map((d, i) => [xPx(i), yPx(+d.ai_score)]);

  // Area polygon: line points + return along y=0
  const areaPoly = [
    ...pts,
    [xPx(n - 1), y0],
    [xPx(0), y0]
  ].map(p => p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');

  // Line path
  const linePath = pts
    .map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1))
    .join(' ');

  // Y axis grid + labels
  const yLevels = [-100, -60, 0, 60, 100];
  let yGridSvg = '';
  for (const v of yLevels) {
    const y   = yPx(v);
    const isZ = v === 0;
    const stroke  = isZ ? '#383838' : '#1e1e1e';
    const dash    = isZ ? ' stroke-dasharray="5,4"' : '';
    const textCol = v > 0 ? '#4ade80' : v < 0 ? '#f87171' : '#666';
    const lbl     = (v > 0 ? '+' : '') + v;
    yGridSvg +=
      `<line x1="${pL}" y1="${y.toFixed(1)}" x2="${(W-pR).toFixed(1)}" y2="${y.toFixed(1)}" stroke="${stroke}" stroke-width="1"${dash}/>` +
      `<text x="${(pL-5).toFixed(1)}" y="${(y+3.5).toFixed(1)}" text-anchor="end" fill="${textCol}" font-size="9" font-family="Space Grotesk,Inter,sans-serif">${lbl}</text>`;
  }

  // X axis labels (5 evenly-spaced)
  const numL = Math.min(5, n);
  let xLabelSvg = '';
  for (let li = 0; li < numL; li++) {
    const idx = Math.round(li * (n - 1) / (numL - 1));
    const x   = xPx(idx).toFixed(1);
    const dt  = new Date(data[idx].timestamp);
    let lbl;
    if (period === '1d') {
      lbl = dt.getHours().toString().padStart(2,'0') + ':' + dt.getMinutes().toString().padStart(2,'0');
    } else {
      lbl = dt.toLocaleString('en',{month:'short'}) + ' ' + dt.getDate();
    }
    xLabelSvg += `<text x="${x}" y="${H-4}" text-anchor="middle" fill="#444" font-size="9" font-family="Inter,sans-serif">${lbl}</text>`;
  }

  // ClipPath IDs — unique per ticker
  const cA    = 'ca_' + ticker;
  const cB    = 'cb_' + ticker;
  const cLine = 'cl_' + ticker;
  const aboveH = Math.max(0, y0 - pT).toFixed(1);
  const belowH = Math.max(0, pT + cH - y0).toFixed(1);

  const svgHtml = `<svg width="${W}" height="${H}" style="display:block;max-width:100%">
<defs>
  <clipPath id="${cA}"><rect x="${pL}" y="${pT}" width="${cW}" height="${aboveH}"/></clipPath>
  <clipPath id="${cB}"><rect x="${pL}" y="${y0.toFixed(1)}" width="${cW}" height="${belowH}"/></clipPath>
  <clipPath id="${cLine}"><rect x="${pL}" y="${pT}" width="${cW}" height="${cH}"/></clipPath>
</defs>
${yGridSvg}
<polygon points="${areaPoly}" fill="#22C55E" fill-opacity="0.13" clip-path="url(#${cA})"/>
<polygon points="${areaPoly}" fill="#EF4444" fill-opacity="0.13" clip-path="url(#${cB})"/>
<path d="${linePath}" fill="none" stroke="#c8c8c8" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" clip-path="url(#${cLine})"/>
${xLabelSvg}
<rect id="ov_${ticker}" x="${pL}" y="${pT}" width="${cW}" height="${cH}" fill="transparent" style="cursor:crosshair"/>
<line id="ch_${ticker}" x1="0" y1="${pT}" x2="0" y2="${(pT+cH).toFixed(1)}" stroke="#444" stroke-width="1" stroke-dasharray="3,3" style="display:none"/>
<circle id="cdot_${ticker}" cx="0" cy="0" r="3" fill="#e0e0e0" style="display:none"/>
</svg>
<div id="tip_${ticker}" style="display:none;position:absolute;top:0;left:0;background:#0f0f0f;border:1px solid #2a2a2a;border-radius:4px;padding:5px 10px;font-size:0.68rem;color:#d0d0d0;pointer-events:none;white-space:nowrap;z-index:20"></div>`;

  container.innerHTML = `<div style="position:relative">${svgHtml}</div>`;

  // Interactive tooltip
  const ov  = document.getElementById('ov_' + ticker);
  const tip = document.getElementById('tip_' + ticker);
  const ch  = document.getElementById('ch_' + ticker);
  const dot = document.getElementById('cdot_' + ticker);

  ov.addEventListener('mousemove', e => {
    const rect = ov.getBoundingClientRect();
    const frac = Math.max(0, Math.min(1, (e.clientX - rect.left) / cW));
    const idx  = Math.round(frac * (n - 1));
    const d    = data[idx];
    const score = +d.ai_score;
    const dt    = new Date(d.timestamp);
    const cx    = xPx(idx).toFixed(1);
    const cy    = yPx(score).toFixed(1);

    ch.setAttribute('x1', cx); ch.setAttribute('x2', cx); ch.style.display = '';
    dot.setAttribute('cx', cx); dot.setAttribute('cy', cy); dot.style.display = '';

    const mo  = dt.toLocaleString('en', {month: 'short'});
    const hh  = dt.getHours().toString().padStart(2,'0');
    const mm  = dt.getMinutes().toString().padStart(2,'0');
    tip.textContent = `${mo} ${dt.getDate()}, ${hh}:${mm}  ${score >= 0 ? '+' : ''}${score.toFixed(1)}`;

    tip.style.display = 'block';
    const svgRect = ov.closest('svg').getBoundingClientRect();
    const relX = e.clientX - svgRect.left;
    const relY = e.clientY - svgRect.top;
    const flipX = relX > W * 0.65;
    tip.style.left  = flipX ? '' : (relX + 14) + 'px';
    tip.style.right = flipX ? (W - relX + 8) + 'px' : '';
    tip.style.top   = Math.max(4, relY - 30) + 'px';
  });
  ov.addEventListener('mouseleave', () => {
    tip.style.display = 'none';
    ch.style.display  = 'none';
    dot.style.display = 'none';
  });
}

/* ── Init ────────────────────────────────────────────────────────── */
window.addEventListener('hashchange', router);

loadScores();
router();
setInterval(loadScores, 60000);
</script>
